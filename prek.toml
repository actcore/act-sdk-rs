[[repos]]
repo = "builtin"
hooks = [
    { id = "check-json" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-clippy", name = "cargo clippy (host)", entry = "cargo clippy --target x86_64-unknown-linux-gnu -p act-types -p act-sdk-macros -- -D warnings", language = "system", pass_filenames = false, always_run = true },
    { id = "cargo-clippy-wasm", name = "cargo clippy (wasm)", entry = "cargo clippy --target wasm32-wasip2 --workspace -- -D warnings", language = "system", pass_filenames = false, always_run = true },
    { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt --all", language = "system", pass_filenames = false, always_run = true },
]
